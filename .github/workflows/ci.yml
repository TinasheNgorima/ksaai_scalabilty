name: Pipeline Smoke Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke test (fast mode, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.25.2 scipy==1.11.4 scikit-learn==1.3.2 \
                      pandas==2.0.3 matplotlib==3.8.0 joblib==1.3.2 \
                      psutil==5.9.6 tqdm==4.66.1

      - name: Install optional packages (best-effort)
        run: |
          pip install xicor==0.4.0 dcor==0.6.0 || echo "Optional packages failed — fallbacks active"
          pip install minepy==1.2.6 || echo "minepy unavailable — MIC will use fallback"

      - name: Install package (editable)
        run: pip install -e .

      - name: Step 0 — Setup (synthetic proxy only)
        run: python 00_setup_and_download.py
        env:
          NGORIMA_FAST: "1"

      - name: Step 1 — Synthetic benchmarks (fast mode)
        run: python 01_synthetic_benchmarks.py
        env:
          NGORIMA_FAST: "1"      # n_reps=3, n_warmup=1, small n only

      - name: Step 2 — Real-domain benchmarks (fast mode)
        run: python 02_real_domain_benchmarks.py
        env:
          NGORIMA_FAST: "1"

      - name: Step 3 — Memory + parallelisation (fast mode)
        run: python 03_memory_and_parallelisation.py
        env:
          NGORIMA_FAST: "1"

      - name: Step 4 — Compile results
        run: python 04_compile_results.py

      - name: Verify output files exist
        run: |
          python -c "
          from pathlib import Path
          required = [
            'results/complexity_exponents.csv',
            'results/crossover_analysis.csv',
            'results/system_state.json',
            'report/Ngorima2025_Results_Report.md',
          ]
          missing = [f for f in required if not Path(f).exists()]
          if missing:
              raise FileNotFoundError(f'Missing outputs: {missing}')
          print('All required outputs present.')
          "

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-results-py${{ matrix.python-version }}
          path: |
            results/
            figures/
            report/
          retention-days: 14
